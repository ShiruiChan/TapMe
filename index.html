<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07071a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TapMe — Lory.Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #07071a;
  --surface:  #0d0d26;
  --glass:    rgba(255,255,255,0.04);
  --glass2:   rgba(255,255,255,0.07);
  --accent:   #6366f1;
  --accent2:  #06b6d4;
  --grad:     linear-gradient(135deg, #6366f1, #06b6d4);
  --glow:     rgba(99,102,241,0.30);
  --text:     #f1f1ff;
  --muted:    rgba(241,241,255,0.45);
  --muted2:   rgba(241,241,255,0.25);
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.12);
  --nav-h:    72px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#root {
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  transition: opacity 0.18s ease, transform 0.18s ease;
}

/* ═══════════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes orb1 {
  0%,100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(40px,-30px) scale(1.15); }
}
@keyframes orb2 {
  0%,100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(-30px,40px) scale(1.1); }
}
@keyframes orb3 {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(25px,20px) scale(1.08); }
  66%      { transform: translate(-20px,-15px) scale(0.95); }
}
@keyframes pulse {
  0%,100% { opacity: 0.5; } 50% { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes checkmark {
  from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; }
}

.anim-up  { animation: fadeUp 0.3s ease both; }
.anim-in  { animation: fadeIn 0.25s ease both; }

/* staggered children */
.stagger > * { animation: fadeUp 0.3s ease both; }
.stagger > *:nth-child(1) { animation-delay: 0.00s; }
.stagger > *:nth-child(2) { animation-delay: 0.05s; }
.stagger > *:nth-child(3) { animation-delay: 0.10s; }
.stagger > *:nth-child(4) { animation-delay: 0.15s; }
.stagger > *:nth-child(5) { animation-delay: 0.20s; }
.stagger > *:nth-child(6) { animation-delay: 0.25s; }
.stagger > *:nth-child(7) { animation-delay: 0.30s; }

/* ═══════════════════════════════════════════════════════
   ORBS BACKGROUND
═══════════════════════════════════════════════════════ */
.orbs {
  position: fixed; inset: 0; pointer-events: none;
  overflow: hidden; z-index: 0;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.18;
}
.orb-1 { width: 340px; height: 340px; background: #6366f1; top: -100px; right: -80px; animation: orb1 14s ease-in-out infinite; }
.orb-2 { width: 280px; height: 280px; background: #06b6d4; bottom: 20%; left: -100px; animation: orb2 18s ease-in-out infinite; }
.orb-3 { width: 200px; height: 200px; background: #8b5cf6; top: 45%; right: -60px; animation: orb3 22s ease-in-out infinite; }

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px + var(--safe-b));
  left: 50%; transform: translateX(-50%) translateY(8px);
  background: rgba(30,30,60,0.92); backdrop-filter: blur(16px);
  border: 0.5px solid var(--border2);
  color: var(--text); font-size: 13.5px; font-weight: 500;
  padding: 10px 22px; border-radius: 100px;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.no-nav { bottom: 32px; }

/* ═══════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════ */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 15px 20px; border-radius: 16px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
}
.btn:active { transform: scale(0.97); opacity: 0.9; }

.btn-primary {
  background: var(--grad); color: #fff;
  box-shadow: 0 4px 24px var(--glow);
}
.btn-secondary {
  background: var(--glass2); color: var(--text);
  border: 0.5px solid var(--border2);
}
.btn-ghost {
  background: none; color: var(--muted);
  border: none; width: auto; padding: 8px 12px;
}
.btn-danger {
  background: rgba(239,68,68,0.12); color: #f87171;
  border: 0.5px solid rgba(239,68,68,0.2);
}
.btn-sm { padding: 11px 16px; font-size: 14px; border-radius: 12px; }

.icon-btn {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: var(--glass2); border: 0.5px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--glass); }

/* ═══════════════════════════════════════════════════════
   INPUTS / FIELDS
═══════════════════════════════════════════════════════ */
.field { margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 11.5px; font-weight: 600;
  letter-spacing: 0.4px; color: var(--muted2); margin-bottom: 6px;
  text-transform: uppercase;
}
.field input, .field textarea {
  width: 100%; padding: 13px 16px;
  background: var(--glass); border: 0.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 15px;
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
.field textarea { resize: none; height: 76px; line-height: 1.5; }
.field input:focus, .field textarea:focus {
  border-color: rgba(99,102,241,0.5);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
}
.field input::placeholder, .field textarea::placeholder { color: var(--muted2); }

.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 48px; }
.eye-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 15px;
  color: var(--muted); padding: 4px; line-height: 1;
}

/* ═══════════════════════════════════════════════════════
   GLASS CARD
═══════════════════════════════════════════════════════ */
.glass-card {
  background: var(--glass);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted2); margin-bottom: 14px;
}

/* ═══════════════════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: rgba(7,7,26,0.85); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex; align-items: flex-start; z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px; padding: 12px 0;
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 10.5px; font-weight: 500;
  transition: color 0.15s;
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.nav-item.active svg { transform: scale(1.12); }
.nav-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent); margin-top: -2px;
  display: none;
}
.nav-item.active .nav-dot { display: block; }

/* ═══════════════════════════════════════════════════════
   DIVIDER
═══════════════════════════════════════════════════════ */
.divider {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--muted2); margin: 14px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 0.5px; background: var(--border);
}

/* ═══════════════════════════════════════════════════════
   AVATAR
═══════════════════════════════════════════════════════ */
.av-ring {
  border-radius: 50%; padding: 2.5px;
  background: var(--grad); display: inline-flex;
  flex-shrink: 0;
}
.av-inner {
  border-radius: 50%; background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; font-weight: 700; color: var(--text);
}
.av-inner img { width: 100%; height: 100%; object-fit: cover; }

/* ═══════════════════════════════════════════════════════
   SKILLS CHIPS
═══════════════════════════════════════════════════════ */
.chips-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip {
  padding: 5px 12px; border-radius: 100px;
  background: rgba(99,102,241,0.12); border: 0.5px solid rgba(99,102,241,0.25);
  font-size: 12px; font-weight: 500; color: rgba(99,102,241,0.9);
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════════════
   SEARCH BAR
═══════════════════════════════════════════════════════ */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-wrap input {
  width: 100%; padding: 12px 16px 12px 42px;
  background: var(--glass2); border: 0.5px solid var(--border);
  border-radius: 14px; color: var(--text); font-size: 15px;
  outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: rgba(99,102,241,0.4); }
.search-wrap input::placeholder { color: var(--muted2); }
.search-ico {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted2); font-size: 16px; pointer-events: none;
}

/* ═══════════════════════════════════════════════════════
   BADGE
═══════════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 9px; border-radius: 100px;
  background: rgba(99,102,241,0.15); border: 0.5px solid rgba(99,102,241,0.25);
  font-size: 12px; font-weight: 600; color: var(--accent);
}

/* ═══════════════════════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════════════════════ */
.screen-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 56px 0 20px;
}
.screen-title { font-size: 26px; font-weight: 800; }
.screen-sub   { font-size: 14px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════════════════════
   MINI CARD (preview в Dashboard и Directory)
═══════════════════════════════════════════════════════ */
.mini-card {
  border-radius: 20px; padding: 20px;
  position: relative; overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.mini-card:active { transform: scale(0.98); }
.mini-card-orb {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.08);
  pointer-events: none;
}
.mini-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.mini-card-name { font-size: 17px; font-weight: 700; }
.mini-card-role { font-size: 13px; opacity: 0.65; }
.mini-card-company { font-size: 12px; opacity: 0.4; margin-top: 1px; }

/* ═══════════════════════════════════════════════════════
   DIRECTORY GRID
═══════════════════════════════════════════════════════ */
.dir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.dir-card {
  background: var(--glass); border: 0.5px solid var(--border2);
  border-radius: 18px; padding: 16px 14px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 8px; cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
}
.dir-card:active { transform: scale(0.97); background: var(--glass2); }
.dir-card-name { font-size: 14px; font-weight: 600; line-height: 1.2; }
.dir-card-role { font-size: 12px; color: var(--muted); }

/* ═══════════════════════════════════════════════════════
   CONTACT ROW (public card)
═══════════════════════════════════════════════════════ */
.contact-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; text-decoration: none; color: var(--text);
  border-bottom: 0.5px solid var(--border);
  transition: opacity 0.15s;
}
.contact-row:last-child { border-bottom: none; }
.contact-row:active { opacity: 0.7; }
.c-icon {
  width: 38px; height: 38px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 17px;
  background: rgba(99,102,241,0.12);
}
.c-text { flex: 1; }
.c-lbl  { font-size: 10.5px; color: var(--muted2); margin-bottom: 1px; }
.c-val  { font-size: 14px; font-weight: 500; }
.c-arr  { color: var(--muted2); font-size: 18px; }

/* ═══════════════════════════════════════════════════════
   LINK CHIPS (public card)
═══════════════════════════════════════════════════════ */
.link-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.link-chip {
  flex: 1; min-width: 60px; display: flex; flex-direction: column;
  align-items: center; gap: 5px; padding: 12px 8px;
  background: var(--glass); border: 0.5px solid var(--border2);
  border-radius: 14px; text-decoration: none; color: var(--text);
  font-size: 11px; font-weight: 500;
  transition: background 0.15s, transform 0.15s;
}
.link-chip:active { transform: scale(0.96); background: var(--glass2); }
.link-chip .lc-icon { font-size: 20px; }

/* ═══════════════════════════════════════════════════════
   QR BLOCK
═══════════════════════════════════════════════════════ */
.qr-block {
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; padding: 20px;
  background: var(--glass); border: 0.5px solid var(--border2);
  border-radius: 20px;
}
.qr-block canvas, .qr-block img { border-radius: 12px; }
.qr-label { font-size: 12px; color: var(--muted); text-align: center; }

/* ═══════════════════════════════════════════════════════
   COLOR PICKER
═══════════════════════════════════════════════════════ */
.color-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.color-dot {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2.5px solid transparent; cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), border-color 0.15s;
  flex-shrink: 0;
}
.color-dot.selected { border-color: #fff; transform: scale(1.15); }
.color-dot:active   { transform: scale(0.9); }

/* ═══════════════════════════════════════════════════════
   STEP INDICATOR (onboarding)
═══════════════════════════════════════════════════════ */
.step-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 32px; }
.step-dot {
  height: 4px; border-radius: 2px;
  background: var(--border2); transition: all 0.3s ease;
}
.step-dot.active { background: var(--accent); width: 24px; }
.step-dot.done   { background: var(--accent2); width: 14px; }
.step-dot:not(.active):not(.done) { width: 14px; }

/* ═══════════════════════════════════════════════════════
   MISC
═══════════════════════════════════════════════════════ */
.gap-8  { display: flex; flex-direction: column; gap: 8px; }
.gap-10 { display: flex; flex-direction: column; gap: 10px; }
.gap-12 { display: flex; flex-direction: column; gap: 12px; }
.gap-16 { display: flex; flex-direction: column; gap: 16px; }

.page-pad { padding: 0 20px calc(var(--nav-h) + 24px + var(--safe-b)); }
.no-nav-pad { padding: 0 20px 40px; }

.logo-ring {
  width: 64px; height: 64px; border-radius: 18px;
  background: var(--grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900; color: #fff;
  box-shadow: 0 8px 32px var(--glow);
}

.section-spacer { height: 16px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: 64px 24px;
}
.empty-state .e-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.empty-state p  { font-size: 14px; color: var(--muted); line-height: 1.5; }

/* profile list item */
.profile-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0; border-bottom: 0.5px solid var(--border);
}
.profile-row:last-child { border-bottom: none; }
.profile-row .p-info { flex: 1; }
.profile-row .p-name { font-size: 15px; font-weight: 600; }
.profile-row .p-role { font-size: 13px; color: var(--muted); margin-top: 1px; }

/* tabs */
.tabs {
  display: flex; background: var(--glass2); border-radius: 14px;
  padding: 4px; border: 0.5px solid var(--border);
}
.tab {
  flex: 1; padding: 10px; border: none; border-radius: 10px;
  font-size: 14.5px; font-weight: 500; cursor: pointer;
  background: none; color: var(--muted); transition: all 0.2s;
  font-family: inherit;
}
.tab.active { background: var(--glass2); color: var(--text); font-weight: 600; box-shadow: 0 1px 6px rgba(0,0,0,0.25); }

/* action grid */
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.action-card {
  background: var(--glass); border: 0.5px solid var(--border2);
  border-radius: 18px; padding: 16px 14px;
  display: flex; flex-direction: column; gap: 8px;
  cursor: pointer; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), background 0.15s;
  text-align: left;
}
.action-card:active { transform: scale(0.97); background: var(--glass2); }
.action-icon { font-size: 24px; }
.action-label { font-size: 13px; font-weight: 600; }
.action-sub   { font-size: 11.5px; color: var(--muted); }

/* ═══════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════ */
.auth-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; padding: 24px 24px 48px;
  position: relative; z-index: 1;
}
.auth-logo { text-align: center; margin-bottom: 36px; }
.auth-logo .logo-ring { margin: 0 auto 14px; }
.auth-logo h1 { font-size: 30px; font-weight: 900; margin-bottom: 6px; }
.auth-logo p  { font-size: 13.5px; color: var(--muted); }

/* ═══════════════════════════════════════════════════════
   ONBOARDING
═══════════════════════════════════════════════════════ */
.onb-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  padding: 0 24px 40px; position: relative; z-index: 1;
}
.onb-top { padding-top: 60px; flex: 1; }
.onb-skip { display: flex; justify-content: flex-end; padding-top: 20px; }
.onb-big-icon { font-size: 56px; margin-bottom: 20px; }
.onb-title { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 10px; }
.onb-sub   { font-size: 15px; color: var(--muted); line-height: 1.6; }
.onb-bullet { display: flex; align-items: flex-start; gap: 12px; margin-top: 20px; }
.onb-bullet .b-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--grad); display: flex; align-items: center;
  justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px;
}
.onb-bullet .b-text { font-size: 14px; color: var(--muted); line-height: 1.5; }
.onb-bullet .b-text strong { color: var(--text); }

/* mini card preview in onboarding step 3 */
.onb-preview {
  border-radius: 16px; padding: 16px;
  margin-bottom: 20px; position: relative; overflow: hidden;
}
.onb-preview-name { font-size: 15px; font-weight: 700; }
.onb-preview-role { font-size: 12px; opacity: 0.65; margin-top: 2px; }

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
.dash-wrap { position: relative; z-index: 1; }
.dash-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 56px 0 24px;
}
.dash-greeting { font-size: 22px; font-weight: 800; }
.dash-sub      { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ═══════════════════════════════════════════════════════
   EDITOR
═══════════════════════════════════════════════════════ */
.av-editor-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
.av-editor {
  width: 90px; height: 90px; border-radius: 50%;
  background: var(--glass2); border: 2px solid rgba(99,102,241,0.4);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  font-size: 28px; font-weight: 700; color: var(--text);
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.av-editor:hover { border-color: var(--accent); }
.av-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; opacity: 0; transition: opacity 0.2s;
}
.av-editor:hover .av-overlay { opacity: 1; }
.av-hint { font-size: 12px; color: var(--muted); }

/* ═══════════════════════════════════════════════════════
   PUBLIC CARD (hero)
═══════════════════════════════════════════════════════ */
.pub-hero {
  border-radius: 24px; padding: 28px 22px 24px;
  margin-bottom: 14px; position: relative; overflow: hidden;
}
.pub-hero-orb1 {
  position: absolute; width: 200px; height: 200px;
  border-radius: 50%; background: rgba(255,255,255,0.08);
  top: -60px; right: -60px; pointer-events: none;
}
.pub-hero-orb2 {
  position: absolute; width: 140px; height: 140px;
  border-radius: 50%; background: rgba(255,255,255,0.05);
  bottom: -40px; left: -40px; pointer-events: none;
}
.pub-hero-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.pub-nfc { opacity: 0.45; }
.pub-nfc svg { width: 24px; height: 24px; fill: #fff; }
.pub-name    { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.pub-role    { font-size: 14.5px; opacity: 0.65; margin-bottom: 2px; }
.pub-company { font-size: 12.5px; opacity: 0.4; }
.pub-tagline { font-size: 13px; opacity: 0.6; margin-top: 6px; font-style: italic; }
.pub-footer  { text-align: center; margin-top: 24px; font-size: 11.5px; color: var(--muted2); }
</style>
</head>
<body>

<div class="orbs" id="orbs-bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div id="root" style="opacity:1;transition:opacity 0.18s ease,transform 0.18s ease"></div>
<div class="toast no-nav" id="toast-el"></div>

<script>
/* ═══════════════════════════════════════════════════════
   STORE
═══════════════════════════════════════════════════════ */
const S = {
  get user()    { try { return JSON.parse(localStorage.getItem('tm_user'))  } catch { return null } },
  set user(v)   { v ? localStorage.setItem('tm_user', JSON.stringify(v)) : localStorage.removeItem('tm_user') },
  get card()    { try { return JSON.parse(localStorage.getItem('tm_card'))  } catch { return null } },
  set card(v)   { localStorage.setItem('tm_card', JSON.stringify(v)) },
  users()       { try { return JSON.parse(localStorage.getItem('tm_users')) || [] } catch { return [] } },
  saveUsers(u)  { localStorage.setItem('tm_users', JSON.stringify(u)) },
};

/* ═══════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════ */
function toast(msg, noNav) {
  const el = document.getElementById('toast-el');
  el.className = 'toast' + (noNav ? ' no-nav' : '');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function initials(name) {
  return (name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}

function hexRgb(h) {
  h = h.replace('#','');
  return `${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)}`;
}

function toB64(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function fromB64(s) {
  return JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/')))));
}

function cardUrl(c) {
  return `${location.origin}${location.pathname}?d=${toB64(c)}`;
}

function navigate(fn, ...args) {
  const r = document.getElementById('root');
  r.style.opacity = '0';
  r.style.transform = 'translateY(10px)';
  setTimeout(() => {
    fn(...args);
    requestAnimationFrame(() => {
      r.style.opacity = '1';
      r.style.transform = 'translateY(0)';
    });
  }, 160);
}

function norm(val, domain) {
  val = (val||'').trim().replace(/^https?:\/\//i,'');
  if (!val) return '';
  if (!domain) return 'https://' + val;
  return 'https://' + (val.includes('.') ? val : `${domain}/${val}`);
}

function buildAvatar(c, size) {
  const s = size || 44;
  if (c && c.avatar) {
    return `<div class="av-ring" style="width:${s+6}px;height:${s+6}px">
      <div class="av-inner" style="width:${s}px;height:${s}px;font-size:${Math.round(s*0.35)}px">
        <img src="${esc(c.avatar)}" alt="">
      </div></div>`;
  }
  const color = c && c.colorHex ? `#${c.colorHex}` : 'var(--accent)';
  return `<div class="av-ring" style="width:${s+6}px;height:${s+6}px">
    <div class="av-inner" style="width:${s}px;height:${s}px;font-size:${Math.round(s*0.35)}px;background:${color}22">
      ${initials(c && c.name || '')}
    </div></div>`;
}

const PALETTE = ['6c63ff','6366f1','06b6d4','10b981','f59e0b','ef4444','ec4899','8b5cf6'];

/* ═══════════════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════════════ */
function route() {
  const params = new URLSearchParams(location.search);
  const encoded = params.get('d');
  const page    = params.get('p');

  if (encoded) {
    try { renderCard(fromB64(encoded)); } catch { renderEmpty(); }
    return;
  }

  if (!S.user) { renderAuth('login'); return; }

  updateToastNav(true);
  if (!S.user.onboarded) { renderOnboarding(1); return; }

  if (page === 'directory') { renderDirectory(); return; }
  if (page === 'profile')   { renderProfile();   return; }
  renderDashboard();
}

function updateToastNav(hasNav) {
  const el = document.getElementById('toast-el');
  if (hasNav) el.classList.remove('no-nav');
  else el.classList.add('no-nav');
}

/* ═══════════════════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════════════════ */
function navHTML(active) {
  const items = [
    { id: 'card', icon: cardSvg(), label: 'Карточка', fn: "navigate(renderDashboard)" },
    { id: 'dir',  icon: dirSvg(),  label: 'Команда',  fn: "navigate(renderDirectory)" },
    { id: 'prof', icon: profSvg(), label: 'Профиль',  fn: "navigate(renderProfile)"  },
  ];
  return `<nav class="bottom-nav">${items.map(i=>`
    <button class="nav-item${active===i.id?' active':''}" onclick="${i.fn}">
      ${i.icon}
      <span>${i.label}</span>
      <div class="nav-dot"></div>
    </button>`).join('')}</nav>`;
}

function cardSvg() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="5" width="20" height="14" rx="3"/>
    <path d="M2 10h20"/>
  </svg>`;
}
function dirSvg() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </svg>`;
}
function profSvg() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </svg>`;
}

/* ═══════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════ */
function renderAuth(mode) {
  updateToastNav(false);
  document.getElementById('root').innerHTML = `
  <div class="auth-wrap anim-up">
    <div class="auth-logo">
      <div class="logo-ring">TM</div>
      <h1>TapMe</h1>
      <p>Корпоративная платформа · Lory.Lab</p>
    </div>

    <div class="tabs" style="margin-bottom:20px">
      <button class="tab ${mode==='login'?'active':''}" onclick="renderAuth('login')">Войти</button>
      <button class="tab ${mode==='register'?'active':''}" onclick="renderAuth('register')">Регистрация</button>
    </div>

    <form onsubmit="submitAuth(event,'${mode}')" class="gap-12" style="margin-bottom:16px">
      ${mode==='register' ? `
      <div class="field">
        <label>Имя и фамилия</label>
        <input name="name" placeholder="Александр Иванов" required autocomplete="name">
      </div>
      <div class="field">
        <label>Отдел / Должность</label>
        <input name="department" placeholder="Разработка" autocomplete="organization-title">
      </div>` : ''}
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@lorylab.ru" required autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <div class="pw-wrap">
          <input type="password" name="password" id="pw-inp" placeholder="••••••••"
            required minlength="6" autocomplete="${mode==='login'?'current-password':'new-password'}">
          <button type="button" class="eye-btn" onclick="togglePw()">👁</button>
        </div>
      </div>
      <button class="btn btn-primary" type="submit" style="margin-top:4px">
        ${mode==='login' ? 'Войти в портал' : 'Создать аккаунт'}
      </button>
    </form>

    <div class="divider">или</div>
    <button class="btn btn-secondary" onclick="toast('Скоро будет доступно', true)">
      ✈️&nbsp; Войти через Telegram
    </button>
  </div>`;
}

function togglePw() {
  const p = document.getElementById('pw-inp');
  p.type = p.type === 'password' ? 'text' : 'password';
}

function submitAuth(e, mode) {
  e.preventDefault();
  const fd    = new FormData(e.target);
  const email = fd.get('email').trim().toLowerCase();
  const pass  = fd.get('password');
  const users = S.users();

  if (mode === 'register') {
    const name = (fd.get('name')||'').trim();
    const dept = (fd.get('department')||'').trim();
    if (!name) return toast('Введи имя', true);
    if (users.find(u => u.email === email)) return toast('Email уже зарегистрирован', true);
    const u = { id: Date.now(), name, email, password: pass, department: dept, onboarded: false };
    S.saveUsers([...users, u]);
    S.user = { id: u.id, name, email, department: dept, onboarded: false };
    navigate(renderOnboarding, 1);
  } else {
    const u = users.find(u => u.email === email && u.password === pass);
    if (!u) return toast('Неверный email или пароль', true);
    S.user = { id: u.id, name: u.name, email: u.email, department: u.department||'', onboarded: u.onboarded||false };
    updateToastNav(true);
    if (!S.user.onboarded) navigate(renderOnboarding, 1);
    else navigate(renderDashboard);
  }
}

/* ═══════════════════════════════════════════════════════
   ONBOARDING
═══════════════════════════════════════════════════════ */
let _onbData = {};

function renderOnboarding(step, data) {
  if (data !== undefined) _onbData = data || {};
  updateToastNav(false);

  const stepDots = [1,2,3].map(s => {
    let cls = 'step-dot';
    if (s < step) cls += ' done';
    else if (s === step) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let content = '';

  if (step === 1) {
    content = `
    <div class="onb-top stagger">
      <div class="onb-big-icon">👋</div>
      <div class="onb-title">Добро пожаловать<br>в Lory.Lab</div>
      <div class="onb-sub">TapMe — корпоративная платформа для обмена визитками и управления командой</div>
      <div class="onb-bullet">
        <div class="b-dot">🪪</div>
        <div class="b-text"><strong>Цифровая визитка</strong> — делись с NFC, QR или ссылкой</div>
      </div>
      <div class="onb-bullet">
        <div class="b-dot">👥</div>
        <div class="b-text"><strong>Директория команды</strong> — все коллеги в одном месте</div>
      </div>
      <div class="onb-bullet">
        <div class="b-dot">⚡</div>
        <div class="b-text"><strong>Автоматизация</strong> — разработка и интеграции для бизнеса</div>
      </div>
    </div>
    <div class="gap-8">
      <button class="btn btn-primary" onclick="navigate(renderOnboarding,2)">Начать настройку →</button>
    </div>`;
  }

  if (step === 2) {
    const u = S.user, c = S.card || {};
    const d = _onbData;
    content = `
    <div class="onb-top stagger">
      <div class="onb-title">Расскажи о себе</div>
      <div class="onb-sub" style="margin-bottom:20px">Заполни основные данные — они появятся на твоей карточке</div>
      <div class="gap-10">
        <div class="field">
          <label>Имя и фамилия</label>
          <input id="o_name" placeholder="Александр Иванов" value="${esc(d.name||c.name||u.name||'')}">
        </div>
        <div class="field">
          <label>Должность</label>
          <input id="o_role" placeholder="Frontend-разработчик" value="${esc(d.role||c.role||'')}">
        </div>
        <div class="field">
          <label>Специализация / Tagline</label>
          <input id="o_tagline" placeholder="Автоматизирую бизнес-процессы" value="${esc(d.tagline||c.tagline||'')}">
        </div>
        <div class="field">
          <label>Навыки (через запятую)</label>
          <input id="o_skills" placeholder="React, n8n, Python, SEO" value="${esc(d.skills||c.skills||'')}">
        </div>
      </div>
    </div>
    <div class="gap-8">
      <button class="btn btn-primary" onclick="onbStep2Next()">Далее →</button>
      <button class="btn btn-ghost btn-sm" onclick="navigate(renderOnboarding,1)">← Назад</button>
    </div>`;
  }

  if (step === 3) {
    const d = _onbData;
    const c = S.card || {};
    const accent = d.color || c.colorHex || '6366f1';
    const rgb = hexRgb(accent);
    content = `
    <div class="onb-top stagger">
      <div class="onb-title">Выбери стиль<br>карточки</div>
      <div class="onb-sub" style="margin-bottom:20px">Это твой акцентный цвет — его увидят коллеги</div>
      <div class="onb-preview" id="onb-prev"
        style="background:linear-gradient(135deg,#${accent},rgba(${rgb},.55))">
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${esc(d.name || S.user.name || 'Твоё имя')}</div>
        <div style="font-size:12px;opacity:.65">${esc(d.role || 'Должность')}</div>
        ${d.tagline ? `<div style="font-size:11px;opacity:.5;margin-top:4px;font-style:italic">${esc(d.tagline)}</div>` : ''}
      </div>
      <div class="glass-card">
        <div class="card-label">Цвет акцента</div>
        <div class="color-row" id="onb-colors">
          ${PALETTE.map(h => `
            <button class="color-dot${h===accent?' selected':''}" style="background:#${h}"
              data-h="${h}" onclick="onbPickColor('${h}')"></button>`).join('')}
        </div>
      </div>
    </div>
    <div class="gap-8">
      <button class="btn btn-primary" onclick="onbFinish()" id="onb-finish-btn"
        style="background:linear-gradient(135deg,#${accent},#06b6d4)">
        Готово — показать карточку 🚀
      </button>
      <button class="btn btn-ghost btn-sm" onclick="navigate(renderOnboarding,2)">← Назад</button>
    </div>`;
  }

  document.getElementById('root').innerHTML = `
  <div class="onb-wrap">
    <div class="onb-skip"><button class="btn btn-ghost btn-sm" onclick="onbSkip()">Пропустить</button></div>
    <div class="step-row">${stepDots}</div>
    ${content}
  </div>`;
}

function onbStep2Next() {
  const name    = (document.getElementById('o_name')?.value||'').trim();
  const role    = (document.getElementById('o_role')?.value||'').trim();
  const tagline = (document.getElementById('o_tagline')?.value||'').trim();
  const skills  = (document.getElementById('o_skills')?.value||'').trim();
  if (!name) return toast('Введи имя', true);
  _onbData = { ..._onbData, name, role, tagline, skills };
  navigate(renderOnboarding, 3);
}

function onbPickColor(hex) {
  _onbData.color = hex;
  const rgb = hexRgb(hex);
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  document.querySelector(`[data-h="${hex}"]`)?.classList.add('selected');
  const prev = document.getElementById('onb-prev');
  if (prev) prev.style.background = `linear-gradient(135deg,#${hex},rgba(${rgb},.55))`;
  const btn = document.getElementById('onb-finish-btn');
  if (btn) btn.style.background = `linear-gradient(135deg,#${hex},#06b6d4)`;
}

function onbFinish() {
  const d = _onbData;
  const u = S.user;
  const existing = S.card || {};
  const card = {
    ...existing,
    name:     d.name    || u.name || existing.name || '',
    role:     d.role    || existing.role    || '',
    tagline:  d.tagline || existing.tagline || '',
    skills:   d.skills  || existing.skills  || '',
    company:  existing.company  || 'Lory.Lab',
    email:    existing.email    || u.email || '',
    colorHex: (d.color || existing.colorHex || '6366f1').replace('#',''),
  };
  S.card = card;
  const users = S.users();
  const idx = users.findIndex(u2 => u2.id === u.id);
  if (idx >= 0) { users[idx].card = card; users[idx].onboarded = true; S.saveUsers(users); }
  S.user = { ...u, onboarded: true };
  _onbData = {};
  updateToastNav(true);
  navigate(renderDashboard);
}

function onbSkip() {
  const u = S.user;
  const users = S.users();
  const idx = users.findIndex(u2 => u2.id === u.id);
  if (idx >= 0) { users[idx].onboarded = true; S.saveUsers(users); }
  S.user = { ...u, onboarded: true };
  if (!S.card) S.card = { name: u.name, email: u.email, colorHex: '6366f1', company: 'Lory.Lab' };
  updateToastNav(true);
  navigate(renderDashboard);
}

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function renderDashboard() {
  const u = S.user, c = S.card || {};
  const accent = (c.colorHex || '6366f1').replace('#','');
  const rgb = hexRgb(accent);
  const firstName = (u.name||'').split(' ')[0];
  const teamCount = S.users().filter(u2 => u2.card).length;

  document.getElementById('root').innerHTML = `
  <div class="dash-wrap page-pad">
    <div class="dash-header">
      <div>
        <div class="dash-greeting">Привет, ${esc(firstName)} 👋</div>
        <div class="dash-sub">${u.department ? esc(u.department) + ' · ' : ''}Lory.Lab</div>
      </div>
      ${buildAvatar(c, 40)}
    </div>

    <div class="mini-card stagger" style="background:linear-gradient(135deg,#${accent},rgba(${rgb},.55));margin-bottom:20px"
      onclick="previewMyCard()">
      <div class="mini-card-orb" style="width:160px;height:160px;top:-50px;right:-40px"></div>
      <div class="mini-card-orb" style="width:100px;height:100px;bottom:-30px;left:-25px"></div>
      <div class="mini-card-top">
        ${buildAvatar(c, 42)}
        <div class="pub-nfc"><svg viewBox="0 0 24 24"><path fill="white" opacity=".5" d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-6 14.5c-2.49 0-4.5-2.01-4.5-4.5S11.51 7.5 14 7.5V9c-1.66 0-3 1.34-3 3s1.34 3 3 3v1.5zm3-3c0 1.66-1.34 3-3 3V15c.83 0 1.5-.67 1.5-1.5S14.83 12 14 12v-1.5c1.66 0 3 1.34 3 3z"/></svg></div>
      </div>
      <div class="mini-card-name">${esc(c.name || u.name || 'Моя карточка')}</div>
      <div class="mini-card-role">${esc(c.role || 'Нажми чтобы открыть')}</div>
      ${c.company ? `<div class="mini-card-company">${esc(c.company)}</div>` : ''}
    </div>

    <div class="action-grid stagger" style="margin-bottom:20px">
      <div class="action-card" onclick="navigate(renderEditor)">
        <div class="action-icon">✏️</div>
        <div class="action-label">Редактировать</div>
        <div class="action-sub">Изменить данные</div>
      </div>
      <div class="action-card" onclick="shareMyCard()">
        <div class="action-icon">🔗</div>
        <div class="action-label">Поделиться</div>
        <div class="action-sub">Скопировать ссылку</div>
      </div>
      <div class="action-card" onclick="previewMyCard()">
        <div class="action-icon">📱</div>
        <div class="action-label">QR-код</div>
        <div class="action-sub">Открыть карточку</div>
      </div>
      <div class="action-card" onclick="navigate(renderDirectory)">
        <div class="action-icon">👥</div>
        <div class="action-label">Команда</div>
        <div class="action-sub">${teamCount} ${declTeam(teamCount)}</div>
      </div>
    </div>

  </div>
  ${navHTML('card')}`;
}

function declTeam(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'человек';
  if ([2,3,4].includes(n%10) && ![12,13,14].includes(n%100)) return 'человека';
  return 'человек';
}

function previewMyCard() {
  const c = S.card;
  if (!c) return toast('Сначала заполни карточку');
  window.open(cardUrl(c), '_blank');
}

function shareMyCard() {
  const c = S.card;
  if (!c) return toast('Сначала заполни карточку');
  const url = cardUrl(c);
  navigator.clipboard?.writeText(url)
    .then(() => toast('Ссылка скопирована!'))
    .catch(() => toast(url));
}

/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */

        <div class="screen-title">Карточка</div>
        <div class="screen-sub">Редактирование профиля</div>
      </div>
      <div class="av-editor" id="av-el" onclick="document.getElementById('av-file').click()"
        style="${c.avatar ? `background-image:url('${esc(c.avatar)}');background-size:cover;background-position:center` : ''}">
        ${c.avatar ? '' : `<span style="font-size:26px;font-weight:700">${initials(c.name||u.name)}</span>`}
        <div class="av-overlay">📷</div>
      </div>
    </div>
    <input type="file" id="av-file" accept="image/*" style="display:none" onchange="handleAv(event)">

    <div class="gap-12 stagger">

        <div class="card-label">Основное</div>
        <div class="gap-10">
          ${fld('name',    'Имя и фамилия', c.name    || u.name || '')}
          ${fld('role',    'Должность',     c.role    || '')}
          ${fld('company', 'Компания',      c.company || 'Lory.Lab')}
          ${fld('tagline', 'Tagline / Специализация', c.tagline || '')}
        </div>
      </div>

      <div class="glass-card">
        <div class="card-label">Навыки</div>

        <div class="chips-row" id="skills-preview"></div>
      </div>

      <div class="glass-card">
        <div class="card-label">Контакты</div>
        <div class="gap-10">
          ${fld('email',   'Email',   c.email   || u.email || '', 'email')}
          ${fld('phone',   'Телефон', c.phone   || '', 'tel')}
          ${fld('website', 'Сайт',    c.website || '', 'url')}
        </div>
      </div>

      <div class="glass-card">
        <div class="card-label">Соцсети RU</div>
        <div class="gap-10">
          ${fld('telegram',  'Telegram (@username)',  c.telegram  || '')}
          ${fld('vk',        'ВКонтакте (username)',  c.vk        || '')}
          ${fld('instagram', 'Instagram (@username)', c.instagram || '')}
        </div>
      </div>

      <div class="glass-card">
        <div class="card-label">Соцсети INT</div>
        <div class="gap-10">
          ${fld('linkedin', 'LinkedIn', c.linkedin || '')}
          ${fld('github',   'GitHub',   c.github   || '')}
          ${fld('behance',  'Behance',  c.behance  || '')}
        </div>
      </div>

      <div class="glass-card">
        <div class="card-label">Цвет акцента</div>
        <div class="color-row">
          ${PALETTE.map(h=>`
            <button class="color-dot${h===accent?' selected':''}" style="background:#${h}"
              data-h="${h}" onclick="pickColor('${h}')"></button>`).join('')}
        </div>
      </div>

      <button class="btn btn-primary" id="save-btn" style="background:linear-gradient(135deg,#${accent},#06b6d4)" onclick="saveCard()">
        Сохранить карточку
      </button>
      <button class="btn btn-secondary" onclick="previewMyCard()">👁&nbsp; Предпросмотр</button>
      <button class="btn btn-secondary" onclick="shareMyCard()">🔗&nbsp; Скопировать ссылку</button>

  </div>
  ${navHTML('card')}`;

  initSkillsPreview();

function initSkillsPreview() {
  const inp = document.getElementById('ef_skills');
  const prv = document.getElementById('skills-preview');
  if (!inp || !prv) return;
  const upd = () => {
    const chips = (inp.value||'').split(',').map(s=>s.trim()).filter(Boolean);
    prv.innerHTML = chips.map(ch=>`<span class="chip">${esc(ch)}</span>`).join('');
  };
  inp.addEventListener('input', upd);
  upd();
}

function fld(name, label, value='', type='text') {
  return `<div class="field">
    <label>${label}</label>
    <input type="${type}" id="ef_${name}" placeholder="${label}" value="${esc(value)}">
  </div>`;
}

function handleAv(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const el = document.getElementById('av-el');
    if (!el) return;
    el.style.backgroundImage = `url('${ev.target.result}')`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
    const span = el.querySelector('span'); if (span) span.remove();
    el._img = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function pickColor(hex) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  document.querySelector(`[data-h="${hex}"]`)?.classList.add('selected');
  const btn = document.getElementById('save-btn');
  if (btn) btn.style.background = `linear-gradient(135deg,#${hex},#06b6d4)`;
}

function collectCard() {
  const v = id => (document.getElementById(id)?.value||'').trim();
  const dot = document.querySelector('.color-dot.selected');
  const av  = document.getElementById('av-el');
  return {
    name:      v('ef_name'),
    role:      v('ef_role'),
    company:   v('ef_company'),
    tagline:   v('ef_tagline'),
    skills:    v('ef_skills'),
    email:     v('ef_email'),
    phone:     v('ef_phone'),
    website:   v('ef_website'),
    telegram:  v('ef_telegram'),
    vk:        v('ef_vk'),
    instagram: v('ef_instagram'),
    linkedin:  v('ef_linkedin'),
    github:    v('ef_github'),
    behance:   v('ef_behance'),
    colorHex:  dot?.dataset?.h || '6366f1',
    avatar:    av?._img || S.card?.avatar || '',
  };
}

function saveCard() {
  const card = collectCard();
  S.card = card;
  const u = S.user;
  const users = S.users();
  const idx = users.findIndex(u2 => u2.id === u.id);
  if (idx >= 0) { users[idx].card = card; S.saveUsers(users); }
  toast('Карточка сохранена ✓');
}

/* ═══════════════════════════════════════════════════════
   DIRECTORY
═══════════════════════════════════════════════════════ */
function renderDirectory(query) {
  query = query || '';
  const all = S.users().filter(u => u.card);
  const filtered = query
    ? all.filter(u => {
        const q = query.toLowerCase();
        return (u.name||'').toLowerCase().includes(q)
          || (u.card.role||'').toLowerCase().includes(q)
          || (u.card.company||'').toLowerCase().includes(q);
      })
    : all;

  const gridHTML = filtered.length === 0
    ? `<div class="empty-state">
        <div class="e-icon">🔍</div>
        <h3>${query ? 'Никого не нашлось' : 'Пока только ты 🚀'}</h3>
        <p>${query ? 'Попробуй другой запрос' : 'Зарегистрируй коллег и они появятся здесь'}</p>
      </div>`
    : `<div class="dir-grid">
        ${filtered.map(u => {
          const c = u.card;
          const accent = (c.colorHex||'6366f1').replace('#','');
          return `<div class="dir-card" onclick="openMemberCard('${toB64(c)}')">
            <div style="background:linear-gradient(135deg,#${accent},rgba(${hexRgb(accent)},.5));border-radius:50%;padding:2px;display:inline-flex">
              <div style="width:56px;height:56px;border-radius:50%;background:rgba(${hexRgb(accent)},.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;overflow:hidden">
                ${c.avatar ? `<img src="${esc(c.avatar)}" style="width:100%;height:100%;object-fit:cover" alt="">` : initials(c.name||u.name||'')}
              </div>
            </div>
            <div class="dir-card-name">${esc(c.name||u.name||'—')}</div>
            <div class="dir-card-role">${esc(c.role||u.department||'—')}</div>
            ${c.company ? `<div style="font-size:11px;color:var(--muted2)">${esc(c.company)}</div>` : ''}
          </div>`;
        }).join('')}
      </div>`;

  document.getElementById('root').innerHTML = `
  <div class="page-pad">
    <div class="screen-header">
      <div>
        <div class="screen-title">Команда</div>
        <div class="screen-sub">${all.length} ${declTeam(all.length)} · Lory.Lab</div>
      </div>
      <span class="badge">${all.length}</span>
    </div>

    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input placeholder="Поиск по имени или должности"
        oninput="renderDirectory(this.value)"
        value="${esc(query)}">
    </div>

    ${gridHTML}
  </div>
  ${navHTML('dir')}`;
}

function openMemberCard(encoded) {
  window.open(`${location.origin}${location.pathname}?d=${encoded}`, '_blank');
}

/* ═══════════════════════════════════════════════════════
   PUBLIC CARD
═══════════════════════════════════════════════════════ */
function renderCard(c) {
  if (c.avatar && !c.avatar.startsWith('data:image/')) c.avatar = '';

  const accent = (c.colorHex||'6366f1').replace('#','');
  const rgb = hexRgb(accent);
  document.documentElement.style.setProperty('--accent', `#${accent}`);
  document.title = c.name ? `${c.name} — TapMe` : 'TapMe · Lory.Lab';
  updateToastNav(false);

  const skillChips = c.skills
    ? c.skills.split(',').map(s=>s.trim()).filter(Boolean)
        .map(s=>`<span class="chip">${esc(s)}</span>`).join('')
    : '';

  let contacts = '';
  if (c.email)    contacts += cRow(`mailto:${encodeURIComponent(c.email)}`, '✉️', 'Email', c.email);
  if (c.phone)    contacts += cRow(`tel:${c.phone}`, '📞', 'Телефон', c.phone);
  if (c.telegram) contacts += cRow(`https://t.me/${c.telegram.replace('@','')}`, '✈️', 'Telegram', c.telegram.startsWith('@')?c.telegram:'@'+c.telegram);

  const socialLinks = [];
  if (c.vk)        socialLinks.push(cChip(norm(c.vk,'vk.com'), '🅱️', 'ВКонтакте'));
  if (c.instagram) socialLinks.push(cChip(`https://instagram.com/${c.instagram.replace('@','')}`, '📸', 'Instagram'));
  if (c.linkedin)  socialLinks.push(cChip(norm(c.linkedin,'linkedin.com/in'), '💼', 'LinkedIn'));
  if (c.github)    socialLinks.push(cChip(norm(c.github,'github.com'), '🐙', 'GitHub'));
  if (c.website)   socialLinks.push(cChip(norm(c.website,''), '🌐', 'Сайт'));
  if (c.behance)   socialLinks.push(cChip(norm(c.behance,'behance.net'), '🎨', 'Behance'));

  document.getElementById('root').innerHTML = `
  <div style="padding:20px 20px 48px;position:relative;z-index:1">
    <div class="pub-hero" style="background:linear-gradient(135deg,#${accent},rgba(${rgb},.5))">
      <div class="pub-hero-orb1"></div>
      <div class="pub-hero-orb2"></div>
      <div class="pub-hero-top">
        <div style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);border:2.5px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;overflow:hidden;flex-shrink:0">
          ${c.avatar ? `<img src="${esc(c.avatar)}" style="width:100%;height:100%;object-fit:cover" alt="">` : initials(c.name||'')}
        </div>
        <div class="pub-nfc">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-6 14.5c-2.49 0-4.5-2.01-4.5-4.5S11.51 7.5 14 7.5V9c-1.66 0-3 1.34-3 3s1.34 3 3 3v1.5zm3-3c0 1.66-1.34 3-3 3V15c.83 0 1.5-.67 1.5-1.5S14.83 12 14 12v-1.5c1.66 0 3 1.34 3 3z" fill="white"/></svg>
        </div>
      </div>
      <div class="pub-name">${esc(c.name||'Без имени')}</div>
      ${c.role    ? `<div class="pub-role">${esc(c.role)}</div>` : ''}
      ${c.company ? `<div class="pub-company">${esc(c.company)}</div>` : ''}
      ${c.tagline ? `<div class="pub-tagline">${esc(c.tagline)}</div>` : ''}
    </div>

    ${skillChips ? `<div class="glass-card" style="margin-bottom:12px"><div class="chips-row">${skillChips}</div></div>` : ''}

    ${contacts ? `<div class="glass-card" style="margin-bottom:12px"><div class="card-label">Контакты</div>${contacts}</div>` : ''}

    ${socialLinks.length ? `<div class="link-chips" style="margin-bottom:12px">${socialLinks.join('')}</div>` : ''}

    <div class="qr-block" style="margin-bottom:16px">
      <div class="qr-label">Отсканируй чтобы сохранить</div>
      <div id="qr-container" style="background:#fff;border-radius:12px;padding:12px;display:inline-block"></div>
      <div class="qr-label">Или поделись ссылкой</div>
    </div>

    <div class="gap-10">
      <button class="btn btn-primary" style="background:linear-gradient(135deg,#${accent},rgba(${rgb},.7))" onclick="dlVCard()">
        👤&nbsp; Сохранить контакт
      </button>
      <button class="btn btn-secondary" onclick="copyPageUrl()">
        🔗&nbsp; Скопировать ссылку
      </button>
    </div>

    <div class="pub-footer">Lory.Lab · TapMe</div>
  </div>`;

  window.__card = c;

  setTimeout(() => {
    const container = document.getElementById('qr-container');
    if (container && typeof QRCode !== 'undefined') {
      try {
        new QRCode(container, {
          text: location.href,
          width: 160, height: 160,
          colorDark: '#1a1a2e', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
      } catch(e) {}
    }
  }, 100);
}

function cRow(href, icon, label, value) {
  return `<a class="contact-row" href="${esc(href)}">
    <div class="c-icon">${icon}</div>
    <div class="c-text">
      <div class="c-lbl">${label}</div>
      <div class="c-val">${esc(value)}</div>
    </div>
    <div class="c-arr">›</div>
  </a>`;
}

function cChip(href, icon, label) {
  if (!href || href === 'https://') return '';
  return `<a class="link-chip" href="${esc(href)}" target="_blank" rel="noopener noreferrer">
    <span class="lc-icon">${icon}</span>${label}
  </a>`;
}

function renderEmpty() {
  updateToastNav(false);
  document.getElementById('root').innerHTML = `
  <div class="empty-state" style="min-height:100vh;justify-content:center;position:relative;z-index:1">
    <div class="e-icon">📇</div>
    <h3>Карточка не найдена</h3>
    <p>Попроси человека поделиться актуальной ссылкой из TapMe · Lory.Lab</p>
    <button class="btn btn-secondary btn-sm" style="margin-top:20px;width:auto;padding:12px 24px"
      onclick="navigate(renderAuth,'login')">Войти в портал</button>
  </div>`;
}

function dlVCard() {
  const c = window.__card; if (!c) return;
  const lines = ['BEGIN:VCARD','VERSION:3.0'];
  if (c.name)    lines.push('FN:'    + c.name);
  if (c.role)    lines.push('TITLE:' + c.role);
  if (c.company) lines.push('ORG:'   + c.company);
  if (c.email)   lines.push('EMAIL:' + c.email);
  if (c.phone)   lines.push('TEL;TYPE=CELL:' + c.phone);
  if (c.website) lines.push('URL:'   + c.website);
  if (c.telegram) lines.push('X-TELEGRAM:' + c.telegram);
  if (c.avatar)  lines.push('PHOTO;ENCODING=b;TYPE=JPEG:' + c.avatar.split(',')[1]);
  lines.push('END:VCARD');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\r\n')], { type: 'text/vcard' }));
  a.download = (c.name || 'contact').replace(/\s+/g,'_') + '.vcf';
  a.click();
  toast('Контакт скачан ✓', true);
}

function copyPageUrl() {
  navigator.clipboard?.writeText(location.href)
    .then(() => toast('Ссылка скопирована!', true))
    .catch(() => toast(location.href, true));
}

   INIT

route();
</script>
